<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeDash | Portfolio Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="dark-mode"> <nav class="navbar">
        <div class="logo">
            <i class="ph ph-trend-up"></i> TradeDash
        </div>
        <div class="nav-controls">
            <div class="search-box">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search stocks...">
            </div>
            <button id="themeToggle" title="Toggle Theme"><i class="ph ph-sun"></i></button>
        </div>
    </nav>

    <main class="container">
        <section class="indices-grid">
            <div class="index-card">
                <div class="index-header">
                    <h4>NIFTY 50</h4>
                    <span class="change positive">+0.85%</span>
                </div>
                <h2>22,453.30</h2>
            </div>
            <div class="index-card">
                <div class="index-header">
                    <h4>SENSEX</h4>
                    <span class="change positive">+0.72%</span>
                </div>
                <h2>73,903.91</h2>
            </div>
            <div class="index-card">
                <div class="index-header">
                    <h4>BANK NIFTY</h4>
                    <span class="change negative">-0.24%</span>
                </div>
                <h2>47,854.00</h2>
            </div>
        </section>

        <div class="dashboard-grid">
            <div class="left-col">
                <section class="portfolio-section card">
                    <h3>Portfolio Tracker</h3>
                    <div class="portfolio-summary">
                        <div>
                            <p>Invested</p>
                            <h3 id="totalInvested">₹0.00</h3>
                        </div>
                        <div>
                            <p>Current</p>
                            <h3 id="currentValue">₹0.00</h3>
                        </div>
                        <div>
                            <p>P&L</p>
                            <h3 id="totalPnL">₹0.00</h3>
                        </div>
                    </div>
                    
                    <form id="addStockForm" class="add-stock-form">
                        <input type="text" id="stockSymbolInput" placeholder="Symbol (e.g. ITC)" required uppercase>
                        <input type="number" id="stockQtyInput" placeholder="Qty" min="1" required>
                        <input type="number" id="stockPriceInput" placeholder="Buy Price" min="0.01" step="0.01" required>
                        <button type="submit">Add Stock</button>
                    </form>

                    <div class="table-container">
                        <table id="portfolioTable">
                            <thead>
                                <tr>
                                    <th>Stock</th>
                                    <th>Qty</th>
                                    <th>Avg Price</th>
                                    <th>LTP</th>
                                    <th>P&L</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="portfolioBody">
                                </tbody>
                        </table>
                    </div>
                </section>

                <section class="watchlist-section card">
                    <h3>My Watchlist</h3>
                    <div id="watchlistContainer" class="watchlist-list">
                        </div>
                </section>
            </div>

            <div class="right-col">
                <section class="chart-section card">
                    <h3>Market Trend (NIFTY)</h3>
                    <div class="chart-container">
                        <canvas id="marketChart"></canvas>
                    </div>
                </section>
                <section class="chart-section card">
                    <h3>Portfolio Allocation</h3>
                    <div class="chart-container">
                        <canvas id="portfolioChart"></canvas>
                    </div>
                </section>
            </div>
        </div>

        <section class="market-stocks card">
            <div class="section-header">
                <h3>Top 50 Market Stocks</h3>
            </div>
            <div id="stocksGrid" class="stocks-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
